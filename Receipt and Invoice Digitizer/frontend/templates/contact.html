<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - RECEIPT and INVOICE DIGITIZER</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 1.2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(100, 200, 255, 0.1);
        }
        .navbar .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #64c8ff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        .navbar .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        .navbar .nav-links a {
            text-decoration: none;
            color: #b0b0b0;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }
        .navbar .nav-links a:hover {
            color: #64c8ff;
            background: rgba(100, 200, 255, 0.1);
            transform: translateY(-2px);
        }
        .content {
            padding: 150px 3rem 4rem;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(100, 200, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(100, 200, 255, 0.2);
            box-shadow: 0 8px 32px rgba(100, 200, 255, 0.1);
        }
        .content h1 {
            text-align: center;
            background: linear-gradient(135deg, #64c8ff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
        }
        .contact-form label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #64c8ff;
        }
        .contact-form input,
        .contact-form textarea {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 5px;
            font-size: 1rem;
            background: rgba(15, 12, 41, 0.5);
            color: #e0e0e0;
            transition: all 0.3s ease;
        }
        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: #64c8ff;
            background: rgba(15, 12, 41, 0.8);
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.2);
        }
        .contact-form button {
            background: linear-gradient(135deg, #64c8ff 0%, #00d4ff 100%);
            color: #0f0c29;
            padding: 0.75rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .contact-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(100, 200, 255, 0.3);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">RECEIPT & INVOICE DIGITIZER</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/login">Sign In</a></li>
            <li><a href="/register_page">New User</a></li>
            <li><a href="/admin_login">Admin</a></li>
        </ul>
    </nav>

    <div class="content">
        <h1>Get In Touch</h1>
        <form class="contact-form">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

    <script>
        const body = document.body;
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.classList.add(savedTheme);
        }
    </script>
</body>
</html>
